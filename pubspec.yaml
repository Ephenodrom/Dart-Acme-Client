name: acme_client
description: ACME client which allows you to obtain a HTTPS Certificate from any ACME CA such as Lets Encrypt.
version: 2.0.0
homepage: https://github.com/Ephenodrom/Dart-Acme-Client
environment:
  sdk: ">=3.8.0 <4.0.0"
dependencies:
  basic_utils: ^5.5.4
  dio: ^5.0.0
  jose: ^0.3.5
  json_annotation: ^4.11.0
  meta: ^1.17.0
dev_dependencies:
  build_runner: ^2.3.0
  document_throws: ^0.2.1
  json_serializable: ^6.6.1
  lint_hard: ^7.1.2
  test: ^1.16.0
  yaml: ^3.1.3
